name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Keep latest Pages artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'github-pages';
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id, name: artifactName, per_page: 100 }
            );
            const matches = artifacts
              .filter((artifact) => artifact.name === artifactName)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const artifact of matches.slice(1)) {
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
            core.info(`Kept ${matches[0]?.id ?? 'no'} ${artifactName} artifact and removed ${Math.max(0, matches.length - 1)} duplicate artifact(s).`);

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
