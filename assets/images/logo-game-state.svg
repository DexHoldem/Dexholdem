<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">DexHoldem game state memory logo</title>
  <desc id="desc">A compact game state memory panel with four poker-state cells.</desc>
  <rect width="256" height="256" rx="32" fill="#fbfaf6"/>
  <rect x="18" y="18" width="220" height="220" rx="18" fill="#ffffff" stroke="#d6dee8" stroke-width="4"/>
  <text x="38" y="56" fill="#111820" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2">GAME STATE</text>
  <g fill="#f7f9fb" stroke="#d6dee8" stroke-width="2">
    <rect x="38" y="78" width="82" height="58" rx="8"/>
    <rect x="136" y="78" width="82" height="58" rx="8"/>
    <rect x="38" y="150" width="82" height="58" rx="8"/>
    <rect x="136" y="150" width="82" height="58" rx="8"/>
  </g>
  <g fill="#101826" font-family="Inter, Arial, sans-serif">
    <text x="50" y="101" font-size="14" font-weight="800">MY</text>
    <text x="50" y="119" font-size="11" font-family="Consolas, monospace">5:0 10:0</text>
    <text x="148" y="101" font-size="14" font-weight="800">OPP</text>
    <text x="148" y="119" font-size="11" font-family="Consolas, monospace">50:0 100:0</text>
    <text x="50" y="173" font-size="14" font-weight="800">BET</text>
    <text x="50" y="191" font-size="11" font-family="Consolas, monospace">POT: --</text>
    <text x="148" y="173" font-size="14" font-weight="800">CARDS</text>
    <text x="148" y="191" font-size="11" font-family="Consolas, monospace">-- -- --</text>
  </g>
  <g transform="translate(194 34) rotate(8)">
    <rect x="0" y="0" width="28" height="40" rx="4" fill="#ffffff" stroke="#9d302d" stroke-width="2"/>
    <text x="8" y="24" fill="#9d302d" font-family="Georgia, serif" font-size="20" font-weight="700">A</text>
  </g>
</svg>
